<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CYX DayZ 启动器</title>
  <meta name="description" content="CYX DayZ 玩家启动器公开下载与自动更新镜像">
  <style>
    :root { color-scheme: dark; --bg:#0b1118; --panel:#121c27; --line:#263647; --text:#e9f2fb; --muted:#9fb0c2; --blue:#2f81f7; --green:#34d399; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:"Microsoft YaHei",system-ui,sans-serif; background:radial-gradient(circle at 15% 15%,#16314d 0,transparent 32%),var(--bg); color:var(--text); display:grid; place-items:center; padding:24px; }
    main { width:min(900px,100%); background:rgba(18,28,39,.94); border:1px solid var(--line); border-radius:22px; padding:clamp(28px,5vw,58px); box-shadow:0 28px 80px rgba(0,0,0,.35); }
    .tag { color:var(--green); font-weight:700; letter-spacing:.08em; }
    h1 { font-size:clamp(36px,7vw,68px); line-height:1.05; margin:18px 0; }
    p { color:var(--muted); font-size:18px; line-height:1.75; }
    .version { display:inline-flex; gap:10px; align-items:center; border:1px solid var(--line); border-radius:999px; padding:8px 14px; color:#cde4ff; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--green); box-shadow:0 0 16px var(--green); }
    .actions { display:flex; flex-wrap:wrap; gap:14px; margin:32px 0 22px; }
    button,a.button { border:0; border-radius:12px; padding:15px 22px; font:inherit; font-weight:700; cursor:pointer; text-decoration:none; }
    button { background:var(--blue); color:white; }
    button:disabled { opacity:.58; cursor:wait; }
    a.button { color:var(--text); border:1px solid var(--line); background:#172331; }
    #status { min-height:30px; color:#b9d4ef; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:12px; margin-top:28px; }
    .card { border:1px solid var(--line); border-radius:14px; padding:18px; color:var(--muted); }
    .card strong { color:var(--text); display:block; margin-bottom:7px; }
  </style>
</head>
<body>
  <main>
    <div class="tag">CYX · DAYZ LAUNCHER</div>
    <h1>一键对齐模组，<br>快速进入服务器。</h1>
    <p>GitHub 公共镜像，无需登录 ChatGPT。安装包会在浏览器内下载两个已校验分片并自动合并。</p>
    <div class="version"><span class="dot"></span> 最新版 v1.2.3</div>
    <div class="actions">
      <button id="download">下载 v1.2.3 安装包</button>
      <a class="button" href="CYX_DayZ_PlayerLauncher_v1.2.3_Source.zip">下载源码</a>
      <a class="button" href="https://github.com/Axiao24321/CYX-DayZ-Launcher">查看 GitHub 仓库</a>
    </div>
    <div id="status" role="status" aria-live="polite"></div>
    <div class="grid">
      <div class="card"><strong>双更新源</strong>GitHub Pages 与原更新站自动切换。</div>
      <div class="card"><strong>完整性校验</strong>分片和完整安装包都校验 SHA-256。</div>
      <div class="card"><strong>Steam 增量更新</strong>只把确认过期的模组交给 Steam 修复。</div>
    </div>
  </main>
  <script>
    const parts = [
      "CYX_Dayz_Launcher_v1.2.3_Setup.exe.part01",
      "CYX_Dayz_Launcher_v1.2.3_Setup.exe.part02"
    ];
    const button = document.querySelector("#download");
    const status = document.querySelector("#status");
    button.addEventListener("click", async () => {
      button.disabled = true;
      const chunks = [];
      let received = 0;
      try {
        for (let i = 0; i < parts.length; i++) {
          status.textContent = `正在下载分片 ${i + 1}/${parts.length}…`;
          const response = await fetch(parts[i], {cache:"no-store"});
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const chunk = await response.arrayBuffer();
          received += chunk.byteLength;
          chunks.push(chunk);
        }
        status.textContent = `已合并 ${(received / 1048576).toFixed(1)} MB，正在保存…`;
        const url = URL.createObjectURL(new Blob(chunks, {type:"application/vnd.microsoft.portable-executable"}));
        const link = document.createElement("a");
        link.href = url;
        link.download = "CYX_Dayz_Launcher_v1.2.3_Setup.exe";
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 30000);
        status.textContent = "安装包已下载，请运行安装。";
      } catch (error) {
        status.textContent = `下载失败：${error.message}，请稍后重试。`;
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
